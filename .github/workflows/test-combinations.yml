name: Test Version Combinations

on:
  schedule:
    # Run monthly on the 1st at midnight UTC
    - cron: '0 0 1 * *'
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'lib/**'
      - '.github/workflows/test-combinations.yml'

jobs:
  test-combinations:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Modern stable combinations
          - ruby: "3.3"
            rails: "7.1"
            label: "Latest stable"
          - ruby: "3.3"
            rails: "8.0"
            label: "Latest Ruby + Rails 8"
          - ruby: "3.2"
            rails: "7.2"
            label: "Ruby 3.2 + Rails 7.2"
          - ruby: "3.1"
            rails: "7.0"
            label: "Ruby 3.1 + Rails 7.0"
          - ruby: "3.0"
            rails: "7.0"
            label: "Ruby 3.0 + Rails 7.0"
          - ruby: "2.7"
            rails: "6.0"
            label: "Legacy support"

    name: Test ${{ matrix.label }} (Ruby ${{ matrix.ruby }} / Rails ${{ matrix.rails }})
    outputs:
      result: ${{ steps.test.outcome }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false

      - name: Build gem
        run: |
          gem build railstest.gemspec
          gem install railstest-*.gem

      - name: Create test fixture gem
        run: |
          mkdir -p test/fixtures/simple_gem
          cd test/fixtures/simple_gem

          # Create a minimal gemspec (no Rails dependency - let railstest handle it)
          cat > simple_gem.gemspec << 'EOF'
          Gem::Specification.new do |s|
            s.name        = "simple_gem"
            s.version     = "0.1.0"
            s.authors     = ["Test"]
            s.email       = ["test@example.com"]
            s.summary     = "Test gem"
            s.files       = Dir["lib/**/*"]
            s.require_paths = ["lib"]
          end
          EOF

          # Create lib directory and basic file
          mkdir -p lib/simple_gem
          cat > lib/simple_gem.rb << 'EOF'
          module SimpleGem
            VERSION = "0.1.0"
          end
          EOF

          # Create test directory with passing test
          mkdir -p test
          cat > test/simple_test.rb << 'EOF'
          require "test_helper"

          class SimpleTest < ActiveSupport::TestCase
            test "truth" do
              assert true
            end
          end
          EOF

          # Create test helper
          cat > test/test_helper.rb << 'EOF'
          require "rails/test_help"
          require "simple_gem"
          EOF

      - name: Test Ruby ${{ matrix.ruby }} + Rails ${{ matrix.rails }}
        id: test
        run: |
          cd test/fixtures/simple_gem
          # Use railstest with explicit versions
          # Note: We have pinned gem versions in gemfiles/ for reference
          railstest --gem-path . --ruby ${{ matrix.ruby }} --rails ${{ matrix.rails }} --db sqlite
        continue-on-error: true

      - name: Report result
        if: always()
        run: |
          if [ "${{ steps.test.outcome }}" = "success" ]; then
            echo "✅ Ruby ${{ matrix.ruby }} + Rails ${{ matrix.rails }} works!"
          else
            echo "❌ Ruby ${{ matrix.ruby }} + Rails ${{ matrix.rails }} failed"
            echo "This combination may need updates to the compatibility matrix"
            echo "See supported_versions.rb and README compatibility matrix"
          fi

  report:
    runs-on: ubuntu-latest
    needs: test-combinations
    if: always()
    steps:
      - name: Check test results
        run: |
          echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Define critical combinations that must pass
          # These are the ones in our compatibility matrix
          CRITICAL_FAILED=false

          # Check each test job result
          # Note: With matrix strategy, we can't easily access individual results
          # So we'll just report that tests ran and remind to check logs

          echo "All test jobs completed. Review individual job logs above." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Action Required" >> $GITHUB_STEP_SUMMARY
          echo "1. Check for any ❌ failures in job logs above" >> $GITHUB_STEP_SUMMARY
          echo "2. If failures are in supported combinations, investigate" >> $GITHUB_STEP_SUMMARY
          echo "3. Update \`lib/railstest/supported_versions.rb\` if needed" >> $GITHUB_STEP_SUMMARY
          echo "4. Update README.md compatibility matrix" >> $GITHUB_STEP_SUMMARY
          echo "5. Update 'Last updated' date in README" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Target Combinations (from gemfiles/)" >> $GITHUB_STEP_SUMMARY
          echo "See \`gemfiles/README.md\` for pinned gem versions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Ruby 3.1, 3.2, 3.3 + Rails 7.0 (✅ Verified)" >> $GITHUB_STEP_SUMMARY
          echo "- Ruby 3.1, 3.2, 3.3 + Rails 7.1 (Expected to work)" >> $GITHUB_STEP_SUMMARY
          echo "- Ruby 3.2, 3.3 + Rails 7.2 (Expected to work)" >> $GITHUB_STEP_SUMMARY
          echo "- Ruby 3.2, 3.3 + Rails 8.0 (Expected to work)" >> $GITHUB_STEP_SUMMARY
          echo "- Ruby 2.7 + Rails 6.0, 6.1 (Legacy support)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "🗓️ Monthly automated test run completed" >> $GITHUB_STEP_SUMMARY
          fi
